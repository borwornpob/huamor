services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: huamor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d huamor"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/huamor
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/huamor
      PYTHONPATH: /opt/airflow
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command: -lc "airflow db migrate && python -m pipelines.db_migration && airflow users create --role Admin --username admin --password admin --firstname Airflow --lastname Admin --email admin@example.com || true"
    volumes:
      - ./pipelines:/opt/airflow/pipelines
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/huamor
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/huamor
      QDRANT_URL: http://qdrant:6333
      PYTHONPATH: /opt/airflow
    command: webserver
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./artifacts:/opt/airflow/artifacts
      - ./scripts:/opt/airflow/scripts

  airflow-scheduler:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/huamor
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/huamor
      QDRANT_URL: http://qdrant:6333
      PYTHONPATH: /opt/airflow
    command: scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./artifacts:/opt/airflow/artifacts
      - ./scripts:/opt/airflow/scripts

volumes:
  postgres_data:
  qdrant_data:
